name: Build Windows EXE

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Setup Node
      uses: actions/setup-node@v3
      with:
        node-version: 18

    - name: Install dependencies
      run: npm install

    - name: Build EXE
      run: npx electron-packager . ExpenseVoucher --platform=win32 --arch=x64

    - name: Upload EXE
      uses: actions/upload-artifact@v3
      with:
        name: ExpenseVoucher-EXE
        path: ExpenseVoucher-win32-x64
