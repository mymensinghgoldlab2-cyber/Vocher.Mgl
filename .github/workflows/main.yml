name: Build Windows EXE

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Dependencies
        working-directory: VoucherApp
        run: npm install

      - name: Build Windows App
        working-directory: VoucherApp
        run: npx electron-packager . ExpenseVoucher --platform=win32 --arch=x64 --overwrite

      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: ExpenseVoucher-EXE
          path: VoucherApp/ExpenseVoucher-win32-x64
